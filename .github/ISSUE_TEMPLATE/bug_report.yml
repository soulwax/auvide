name: Bug report
description: Report a reproducible auvide problem.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not attach private source video or credentials."
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Include the expected behavior and the actual result.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. Run ...\n2. Select ...\n3. Observe ..."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, auvide version, GPU, driver version, and `auvide --doctor` output when available.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant terminal or desktop log lines with paths and personal data redacted.
