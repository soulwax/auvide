name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install engine (with dev extras)
        working-directory: engine
        run: uv pip install --system -e ".[dev]"

      - name: ruff check
        working-directory: engine
        run: uv run --no-project ruff check .

      - name: mypy
        working-directory: engine
        run: uv run --no-project mypy src

      - name: pytest
        working-directory: engine
        run: uv run --no-project pytest -v --cov=auvide --cov-report=term-missing

  desktop:
    name: desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: desktop
        run: bun install --frozen-lockfile

      - name: Stage engine into src-tauri/engine
        working-directory: desktop
        run: bun run stage-engine

      - name: TypeScript build
        working-directory: desktop
        run: bun run build

      - name: cargo fmt check
        working-directory: desktop
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: cargo check
        working-directory: desktop
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: cargo clippy
        working-directory: desktop
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
