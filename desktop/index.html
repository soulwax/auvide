<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>auvide</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header>
      <h1>auvide</h1><span class="sub">AI upscale → vibrant HDR10</span>
    </header>

    <main>
      <div class="row">
        <label>Input</label>
        <input id="input" type="text" placeholder="pick a video…" readonly />
        <button id="pick-input">Browse…</button>
      </div>
      <div class="row">
        <label>Output</label>
        <input id="output" type="text" placeholder="output .mp4" />
        <button id="pick-output">Browse…</button>
      </div>

      <div class="chips" id="styles"></div>
      <div class="pipeline" id="pipeline">Pipeline: —</div>

      <section class="opts">
        <div class="opt"><label>Scale</label><select id="scale"><option>2</option><option>3</option><option>4</option></select></div>
        <div class="opt"><label>Model</label><select id="model"></select></div>
        <div class="opt"><label>HDR</label><select id="hdr"><option>on</option><option>off</option></select></div>
        <div class="opt"><label>Interpolate</label><select id="interp"><option value="0">Off</option><option value="2">2×</option><option value="3">3×</option><option value="4">4×</option></select></div>
        <div class="opt"><label>Deliver</label><select id="target"></select></div>
        <div class="opt"><label>Denoise</label><select id="denoise"><option>off</option><option>light</option><option>medium</option><option>strong</option></select></div>
      </section>

      <section class="grade">
        <div class="sliders" id="sliders"></div>
        <div class="curvewrap">
          <div class="curvehead"><span>Curves</span><button id="curve-reset" class="mini">reset</button></div>
          <canvas id="curve" width="240" height="240"></canvas>
          <div class="hint">click to add a point · drag to shape · overrides the Contrast knob</div>
        </div>
      </section>

      <section class="actions">
        <button id="start" class="accent">▶ Start</button>
        <button id="cancel" disabled>Cancel</button>
        <div class="bar"><div id="fill"></div></div>
        <span id="status" class="status">Ready.</span>
      </section>

      <pre id="log" class="log"></pre>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
